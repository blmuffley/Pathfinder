<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="'DM Sans', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#39FF14"/>
    </marker>
    <filter id="s5"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1C1917" flood-opacity="0.06"/></filter>
  </defs>

  <rect width="1200" height="550" fill="#FAFAF8"/>

  <text x="600" y="40" text-anchor="middle" font-family="'Syne', sans-serif" font-size="24" font-weight="800" fill="#1C1917">Classification Engine</text>
  <text x="600" y="58" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14" letter-spacing="0.15em">RAW FLOWS → CLASSIFIED INTEGRATIONS + INTERFACES</text>

  <!-- Input -->
  <rect x="40" y="90" width="180" height="80" rx="12" fill="#0E0E0C" stroke="#39FF14" stroke-width="1.5"/>
  <text x="130" y="120" text-anchor="middle" font-family="'Syne', sans-serif" font-size="13" font-weight="700" fill="#39FF14">Raw Flows</text>
  <text x="130" y="140" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194">src_ip:port → dst_ip:port</text>
  <text x="130" y="155" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194">proto, process, bytes</text>

  <line x1="220" y1="130" x2="280" y2="130" stroke="#39FF14" stroke-width="2" marker-end="url(#a5)"/>

  <!-- Rule 1: Port-exact -->
  <rect x="280" y="80" width="170" height="100" rx="12" fill="#FFFFFF" stroke="#39FF14" stroke-width="1.5" filter="url(#s5)"/>
  <text x="365" y="107" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14" font-weight="700">PRIORITY 1</text>
  <text x="365" y="127" text-anchor="middle" font-family="'Syne', sans-serif" font-size="13" font-weight="700" fill="#1C1917">Port Exact</text>
  <text x="365" y="147" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" fill="#A8A194">443→HTTPS, 5432→PG</text>
  <text x="365" y="165" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#39FF14">conf: 0.90</text>

  <line x1="450" y1="130" x2="500" y2="130" stroke="#39FF14" stroke-width="1.5" marker-end="url(#a5)"/>
  <text x="475" y="122" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="8" fill="#A8A194">miss</text>

  <!-- Rule 2: Port-range -->
  <rect x="500" y="80" width="170" height="100" rx="12" fill="#FFFFFF" stroke="#E8E6E0" stroke-width="1.5" filter="url(#s5)"/>
  <text x="585" y="107" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194" font-weight="700">PRIORITY 2</text>
  <text x="585" y="127" text-anchor="middle" font-family="'Syne', sans-serif" font-size="13" font-weight="700" fill="#1C1917">Port Range</text>
  <text x="585" y="147" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" fill="#A8A194">Ephemeral + process match</text>
  <text x="585" y="165" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">conf: 0.75</text>

  <line x1="670" y1="130" x2="720" y2="130" stroke="#A8A194" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Rule 3: Process-name -->
  <rect x="720" y="80" width="170" height="100" rx="12" fill="#FFFFFF" stroke="#E8E6E0" stroke-width="1.5" filter="url(#s5)"/>
  <text x="805" y="107" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194" font-weight="700">PRIORITY 3</text>
  <text x="805" y="127" text-anchor="middle" font-family="'Syne', sans-serif" font-size="13" font-weight="700" fill="#1C1917">Process Name</text>
  <text x="805" y="147" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" fill="#A8A194">postgres, nginx, java</text>
  <text x="805" y="165" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">conf: 0.85</text>

  <line x1="890" y1="130" x2="940" y2="130" stroke="#A8A194" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Rule 4/5: Default -->
  <rect x="940" y="80" width="170" height="100" rx="12" fill="#FFFFFF" stroke="#E8E6E0" stroke-width="1" filter="url(#s5)"/>
  <text x="1025" y="107" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194" font-weight="700">PRIORITY 4–5</text>
  <text x="1025" y="127" text-anchor="middle" font-family="'Syne', sans-serif" font-size="13" font-weight="700" fill="#1C1917">Heuristic / Default</text>
  <text x="1025" y="147" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" fill="#A8A194">Byte patterns / Custom</text>
  <text x="1025" y="165" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">conf: 0.30–0.60</text>

  <!-- Confidence modifiers -->
  <text x="600" y="220" text-anchor="middle" font-family="'Syne', sans-serif" font-size="16" font-weight="700" fill="#1C1917">Confidence Modifiers</text>

  <rect x="80" y="240" width="200" height="50" rx="10" fill="#0E0E0C"/>
  <text x="180" y="262" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#39FF14">flow_count > 100</text>
  <text x="180" y="278" text-anchor="middle" font-family="'Syne', sans-serif" font-size="12" font-weight="700" fill="#39FF14">+0.05</text>

  <rect x="310" y="240" width="200" height="50" rx="10" fill="#0E0E0C"/>
  <text x="410" y="262" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#39FF14">Consistent 7+ days</text>
  <text x="410" y="278" text-anchor="middle" font-family="'Syne', sans-serif" font-size="12" font-weight="700" fill="#39FF14">+0.05</text>

  <rect x="540" y="240" width="200" height="50" rx="10" fill="#0E0E0C"/>
  <text x="640" y="262" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#39FF14">Process confirms port</text>
  <text x="640" y="278" text-anchor="middle" font-family="'Syne', sans-serif" font-size="12" font-weight="700" fill="#39FF14">+0.10</text>

  <rect x="770" y="240" width="200" height="50" rx="10" fill="#1C1917"/>
  <text x="870" y="262" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">Ephemeral port >32768</text>
  <text x="870" y="278" text-anchor="middle" font-family="'Syne', sans-serif" font-size="12" font-weight="700" fill="#A8A194">−0.15</text>

  <!-- Port map -->
  <text x="600" y="330" text-anchor="middle" font-family="'Syne', sans-serif" font-size="16" font-weight="700" fill="#1C1917">Port → Classification Map</text>

  <rect x="60" y="350" width="160" height="55" rx="10" fill="#FFFFFF" stroke="#39FF14" stroke-width="1.5"/>
  <text x="140" y="372" text-anchor="middle" font-family="'Syne', sans-serif" font-size="12" font-weight="700" fill="#1C1917">API</text>
  <text x="140" y="392" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194">80 443 8080 8443</text>

  <rect x="240" y="350" width="160" height="55" rx="10" fill="#FFFFFF" stroke="#39FF14" stroke-width="1.5"/>
  <text x="320" y="372" text-anchor="middle" font-family="'Syne', sans-serif" font-size="12" font-weight="700" fill="#1C1917">Database</text>
  <text x="320" y="392" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194">5432 3306 1433 27017</text>

  <rect x="420" y="350" width="160" height="55" rx="10" fill="#FFFFFF" stroke="#39FF14" stroke-width="1.5"/>
  <text x="500" y="372" text-anchor="middle" font-family="'Syne', sans-serif" font-size="12" font-weight="700" fill="#1C1917">Messaging</text>
  <text x="500" y="392" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194">5672 9092 61616 4222</text>

  <rect x="600" y="350" width="160" height="55" rx="10" fill="#FFFFFF" stroke="#E8E6E0" stroke-width="1.5"/>
  <text x="680" y="372" text-anchor="middle" font-family="'Syne', sans-serif" font-size="12" font-weight="700" fill="#1C1917">File Transfer</text>
  <text x="680" y="392" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194">21 22 990</text>

  <rect x="780" y="350" width="160" height="55" rx="10" fill="#FFFFFF" stroke="#E8E6E0" stroke-width="1.5"/>
  <text x="860" y="372" text-anchor="middle" font-family="'Syne', sans-serif" font-size="12" font-weight="700" fill="#1C1917">Email</text>
  <text x="860" y="392" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194">25 465 587 993</text>

  <rect x="960" y="350" width="160" height="55" rx="10" fill="#FFFFFF" stroke="#E8E6E0" stroke-width="1"/>
  <text x="1040" y="372" text-anchor="middle" font-family="'Syne', sans-serif" font-size="12" font-weight="700" fill="#1C1917">Directory</text>
  <text x="1040" y="392" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194">389 636</text>

  <!-- Threshold bar -->
  <text x="600" y="445" text-anchor="middle" font-family="'Syne', sans-serif" font-size="14" font-weight="700" fill="#1C1917">Confidence Threshold: 0.80</text>
  <rect x="100" y="460" width="1000" height="8" rx="4" fill="#E8E6E0"/>
  <rect x="100" y="460" width="800" height="8" rx="4" fill="#39FF14"/>
  <circle cx="900" cy="464" r="6" fill="#39FF14" stroke="#FAFAF8" stroke-width="2"/>
  <text x="100" y="485" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194">0.0</text>
  <text x="900" y="485" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14" font-weight="700">0.80 threshold</text>
  <text x="1100" y="485" text-anchor="end" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194">1.0</text>
  <text x="400" y="500" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" fill="#A8A194">Auto-create CI</text>
  <text x="1050" y="500" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" fill="#A8A194">Flag for review</text>

  <text x="600" y="540" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194" letter-spacing="0.1em">AVENNORTH PATHFINDER — CLASSIFICATION ENGINE</text>
</svg>
