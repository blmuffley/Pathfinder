<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'DM Sans', 'Helvetica Neue', sans-serif">
  <defs>
    <filter id="s4"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1C1917" flood-opacity="0.06"/></filter>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#39FF14"/>
    </marker>
    <marker id="a4g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#A8A194"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#0E0E0C"/>

  <text x="600" y="40" text-anchor="middle" font-family="'Syne', sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">PostgreSQL Schema — Gateway</text>
  <text x="600" y="58" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14" letter-spacing="0.15em">INTERMEDIATE DATA STORE — ENTITY RELATIONSHIP DIAGRAM</text>

  <!-- agents table -->
  <rect x="40" y="85" width="300" height="220" rx="12" fill="#1C1917" stroke="#39FF14" stroke-width="1.5"/>
  <rect x="40" y="85" width="300" height="32" rx="12" fill="#39FF14"/>
  <rect x="40" y="105" width="300" height="12" fill="#39FF14"/>
  <text x="190" y="105" text-anchor="middle" font-family="'Syne', sans-serif" font-size="13" font-weight="700" fill="#0E0E0C">agents</text>
  <text x="60" y="140" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">PK</text>
  <text x="90" y="140" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">id</text>
  <text x="250" y="140" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">UUID</text>
  <text x="60" y="158" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">UK</text>
  <text x="90" y="158" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">agent_id</text>
  <text x="250" y="158" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(64)</text>
  <text x="90" y="176" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">hostname</text>
  <text x="250" y="176" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(255)</text>
  <text x="90" y="194" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">os_type</text>
  <text x="250" y="194" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(20)</text>
  <text x="90" y="212" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">agent_version</text>
  <text x="250" y="212" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(50)</text>
  <text x="90" y="230" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">enrolled_at</text>
  <text x="250" y="230" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">TIMESTAMPTZ</text>
  <text x="90" y="248" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">last_heartbeat</text>
  <text x="250" y="248" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">TIMESTAMPTZ</text>
  <text x="90" y="266" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">status</text>
  <text x="250" y="266" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(20)</text>
  <text x="90" y="284" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">sn_sys_id</text>
  <text x="250" y="284" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(32)</text>

  <!-- raw_flows table -->
  <rect x="40" y="340" width="300" height="300" rx="12" fill="#1C1917" stroke="#39FF1488" stroke-width="1"/>
  <rect x="40" y="340" width="300" height="32" rx="12" fill="#39FF1488"/>
  <rect x="40" y="360" width="300" height="12" fill="#39FF1488"/>
  <text x="190" y="360" text-anchor="middle" font-family="'Syne', sans-serif" font-size="13" font-weight="700" fill="#0E0E0C">raw_flows</text>
  <text x="265" y="360" font-family="'Space Mono', monospace" font-size="8" fill="#0E0E0C">PARTITIONED</text>
  <text x="60" y="395" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">PK</text>
  <text x="90" y="395" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">id</text>
  <text x="250" y="395" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">BIGSERIAL</text>
  <text x="60" y="413" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">FK</text>
  <text x="90" y="413" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">agent_id</text>
  <text x="250" y="413" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">→ agents</text>
  <text x="90" y="431" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">src_ip, src_port</text>
  <text x="250" y="431" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">INET, INT</text>
  <text x="90" y="449" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">dst_ip, dst_port</text>
  <text x="250" y="449" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">INET, INT</text>
  <text x="90" y="467" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">protocol</text>
  <text x="250" y="467" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(10)</text>
  <text x="90" y="485" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">bytes_sent, bytes_recv</text>
  <text x="250" y="485" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">BIGINT</text>
  <text x="90" y="503" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">process_name, pid</text>
  <text x="90" y="521" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">captured_at</text>
  <text x="250" y="521" font-family="'DM Sans', sans-serif" font-size="9" fill="#39FF14" text-anchor="end">PARTITION KEY</text>
  <text x="90" y="539" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">ingested_at</text>
  <text x="90" y="557" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">classified</text>
  <text x="250" y="557" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">BOOLEAN</text>

  <!-- FK arrow agents → raw_flows -->
  <line x1="190" y1="305" x2="190" y2="340" stroke="#39FF14" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="200" y="330" font-family="'Space Mono', monospace" font-size="8" fill="#A8A194">1:M</text>

  <!-- classified_integrations -->
  <rect x="440" y="85" width="320" height="240" rx="12" fill="#1C1917" stroke="#39FF14" stroke-width="1.5"/>
  <rect x="440" y="85" width="320" height="32" rx="12" fill="#39FF14"/>
  <rect x="440" y="105" width="320" height="12" fill="#39FF14"/>
  <text x="600" y="105" text-anchor="middle" font-family="'Syne', sans-serif" font-size="13" font-weight="700" fill="#0E0E0C">classified_integrations</text>
  <text x="460" y="140" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">PK</text>
  <text x="490" y="140" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">id</text>
  <text x="670" y="140" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">UUID</text>
  <text x="460" y="158" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">UK</text>
  <text x="490" y="158" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">source_app</text>
  <text x="670" y="158" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(255)</text>
  <text x="460" y="176" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">UK</text>
  <text x="490" y="176" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">target_app</text>
  <text x="670" y="176" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(255)</text>
  <text x="490" y="194" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">integration_type</text>
  <text x="670" y="194" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(50)</text>
  <text x="490" y="212" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">classification_confidence</text>
  <text x="670" y="212" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">DECIMAL(3,2)</text>
  <text x="490" y="230" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">first_seen, last_seen</text>
  <text x="670" y="230" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">TIMESTAMPTZ</text>
  <text x="490" y="248" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">flow_count</text>
  <text x="670" y="248" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">BIGINT</text>
  <text x="490" y="266" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">synced_to_sn</text>
  <text x="670" y="266" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">BOOLEAN</text>
  <text x="490" y="284" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">sn_sys_id</text>
  <text x="670" y="284" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(32)</text>
  <text x="490" y="302" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">created_at, updated_at</text>

  <!-- classified_interfaces -->
  <rect x="840" y="85" width="320" height="260" rx="12" fill="#1C1917" stroke="#39FF14" stroke-width="1.5"/>
  <rect x="840" y="85" width="320" height="32" rx="12" fill="#39FF14"/>
  <rect x="840" y="105" width="320" height="12" fill="#39FF14"/>
  <text x="1000" y="105" text-anchor="middle" font-family="'Syne', sans-serif" font-size="13" font-weight="700" fill="#0E0E0C">classified_interfaces</text>
  <text x="860" y="140" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">PK</text>
  <text x="890" y="140" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">id</text>
  <text x="1070" y="140" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">UUID</text>
  <text x="860" y="158" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">FK</text>
  <text x="890" y="158" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">integration_id</text>
  <text x="1070" y="158" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">→ integrations</text>
  <text x="860" y="176" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">UK</text>
  <text x="890" y="176" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">protocol</text>
  <text x="1070" y="176" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(20)</text>
  <text x="860" y="194" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">UK</text>
  <text x="890" y="194" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">port</text>
  <text x="1070" y="194" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">INTEGER</text>
  <text x="860" y="212" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">UK</text>
  <text x="890" y="212" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">direction</text>
  <text x="1070" y="212" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(20)</text>
  <text x="890" y="230" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">pattern</text>
  <text x="890" y="248" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">process_name, avg_bytes</text>
  <text x="890" y="266" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">flow_count</text>
  <text x="890" y="284" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">first_seen, last_seen</text>
  <text x="890" y="302" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">synced_to_sn, sn_sys_id</text>

  <!-- FK arrow integrations → interfaces -->
  <line x1="760" y1="158" x2="840" y2="158" stroke="#39FF14" stroke-width="2" marker-end="url(#a4)"/>
  <text x="800" y="150" text-anchor="middle" font-family="'Space Mono', monospace" font-size="8" fill="#39FF14">1:M</text>

  <!-- health_metrics -->
  <rect x="440" y="390" width="320" height="180" rx="12" fill="#1C1917" stroke="#39FF1488" stroke-width="1"/>
  <rect x="440" y="390" width="320" height="32" rx="12" fill="#39FF1488"/>
  <rect x="440" y="410" width="320" height="12" fill="#39FF1488"/>
  <text x="600" y="410" text-anchor="middle" font-family="'Syne', sans-serif" font-size="13" font-weight="700" fill="#0E0E0C">health_metrics</text>
  <text x="690" y="410" font-family="'Space Mono', monospace" font-size="8" fill="#0E0E0C">PARTITIONED</text>
  <text x="460" y="445" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">PK</text>
  <text x="490" y="445" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">id</text>
  <text x="670" y="445" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">BIGSERIAL</text>
  <text x="460" y="463" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">FK</text>
  <text x="490" y="463" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">integration_id</text>
  <text x="670" y="463" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">→ integrations</text>
  <text x="460" y="481" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">FK</text>
  <text x="490" y="481" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">interface_id</text>
  <text x="670" y="481" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">→ interfaces (nullable)</text>
  <text x="490" y="499" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">metric_type</text>
  <text x="670" y="499" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">VARCHAR(30)</text>
  <text x="490" y="517" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">metric_value</text>
  <text x="670" y="517" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">DECIMAL(12,4)</text>
  <text x="490" y="535" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">recorded_at</text>
  <text x="670" y="535" font-family="'DM Sans', sans-serif" font-size="9" fill="#39FF14" text-anchor="end">PARTITION KEY</text>

  <!-- FK arrows to health_metrics -->
  <line x1="600" y1="325" x2="600" y2="390" stroke="#A8A194" stroke-width="1.5" marker-end="url(#a4g)" stroke-dasharray="5,3"/>

  <!-- sn_sync_log -->
  <rect x="840" y="420" width="320" height="150" rx="12" fill="#1C1917" stroke="#A8A194" stroke-width="1"/>
  <rect x="840" y="420" width="320" height="32" rx="12" fill="#A8A19444"/>
  <rect x="840" y="440" width="320" height="12" fill="#A8A19444"/>
  <text x="1000" y="440" text-anchor="middle" font-family="'Syne', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">sn_sync_log</text>
  <text x="860" y="475" font-family="'Space Mono', monospace" font-size="9" fill="#39FF14">PK</text>
  <text x="890" y="475" font-family="'Space Mono', monospace" font-size="10" fill="#FFFFFF">id</text>
  <text x="1070" y="475" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">BIGSERIAL</text>
  <text x="890" y="493" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">entity_type, entity_id</text>
  <text x="890" y="511" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">sn_sys_id</text>
  <text x="890" y="529" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">operation</text>
  <text x="1070" y="529" font-family="'DM Sans', sans-serif" font-size="9" fill="#A8A194" text-anchor="end">create | update | delete</text>
  <text x="890" y="547" font-family="'Space Mono', monospace" font-size="10" fill="#A8A194">status, error_message</text>

  <!-- Legend -->
  <rect x="40" y="660" width="12" height="12" rx="2" fill="#39FF14"/>
  <text x="60" y="670" font-family="'DM Sans', sans-serif" font-size="10" fill="#A8A194">Primary key / Unique key</text>
  <rect x="200" y="660" width="12" height="12" rx="2" fill="#39FF1488"/>
  <text x="220" y="670" font-family="'DM Sans', sans-serif" font-size="10" fill="#A8A194">Partitioned table</text>
  <line x1="380" y1="666" x2="420" y2="666" stroke="#39FF14" stroke-width="2"/>
  <text x="430" y="670" font-family="'DM Sans', sans-serif" font-size="10" fill="#A8A194">Foreign key (1:M)</text>

  <text x="600" y="692" text-anchor="middle" font-family="'Space Mono', monospace" font-size="9" fill="#A8A194" letter-spacing="0.1em">AVENNORTH PATHFINDER — POSTGRESQL SCHEMA (GATEWAY)</text>
</svg>
