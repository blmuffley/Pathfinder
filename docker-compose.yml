version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pathfinder
      POSTGRES_USER: pathfinder
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  gateway:
    build:
      context: .
      dockerfile: src/gateway/Dockerfile
    ports:
      - "8443:8443"
    environment:
      PF_DB_URL: postgres://pathfinder:localdev@postgres:5432/pathfinder?sslmode=disable
      PF_SN_INSTANCE: ${PF_SN_INSTANCE:-https://mock-sn.localhost}
    depends_on:
      - postgres

  ai-engine:
    build:
      context: .
      dockerfile: src/intelligence/shared-ai-engine/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PF_DB_URL: postgres://pathfinder:localdev@postgres:5432/pathfinder?sslmode=disable

volumes:
  pgdata:
